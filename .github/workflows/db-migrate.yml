name: Database Migration

# Triggered manually or automatically after backend deploy on main
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options: [production, staging]
  workflow_run:
    workflows: [Deploy Backend]
    types: [completed]
    branches: [main]

jobs:
  migrate:
    name: Run Prisma Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only run if triggered manually, or if the deploy workflow succeeded
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        run: pnpm --filter backend exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
