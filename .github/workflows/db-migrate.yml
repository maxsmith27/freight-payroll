name: Database Migration

# Manual fallback only — Render runs `prisma migrate deploy` automatically
# in its startCommand before the app boots, so this workflow is NOT needed
# on every deploy. Use it to run migrations against staging, or to force a
# migration outside of a normal deploy (e.g. hotfix, rollback).
#
# Requires DATABASE_URL to be set in the target GitHub environment's secrets.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options: [production, staging]

jobs:
  migrate:
    name: Run Prisma Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        run: pnpm --filter backend exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
