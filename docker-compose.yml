version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: freight_payroll_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-freight_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-freight_dev_pass}
      POSTGRES_DB: ${POSTGRES_DB:-freight_payroll}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-freight_admin}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: freight_payroll_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile.dev
    container_name: freight_payroll_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-freight_admin}:${POSTGRES_PASSWORD:-freight_dev_pass}@postgres:5432/${POSTGRES_DB:-freight_payroll}
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      PORT: 3001
      NODE_ENV: development
    ports:
      - '3001:3001'
    volumes:
      - ./packages/backend:/app
      - ./packages/shared:/shared
      - /app/node_modules
    command: pnpm dev

  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile.dev
    container_name: freight_payroll_web
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:3001
    ports:
      - '3000:3000'
    volumes:
      - ./packages/frontend:/app
      - /app/node_modules
    command: pnpm dev --host

volumes:
  postgres_data:
  redis_data:
