services:
  - type: web
    name: freight-payroll-backend
    runtime: node
    # No rootDir — run from repo root so pnpm can resolve workspace:* dependencies.
    # prisma migrate deploy runs in startCommand, not here, because Render's build
    # network cannot always reach the database (connection refused from build runners).
    buildCommand: npm install -g pnpm@9.15.0 && pnpm install --frozen-lockfile && pnpm --filter @freight-payroll/shared run build && pnpm --filter @freight-payroll/backend run build
    startCommand: pnpm --filter @freight-payroll/backend run start:prod
    envVars:
      - key: NODE_ENV
        value: production
